# ============================================================
# Home Assistant configuratie voor El Niño Monitor
# ============================================================
#
# Voeg onderstaande toe aan je configuration.yaml
# Pas het IP-adres aan naar dat van je Raspberry Pi.
#
# Na toevoegen: Developer Tools → YAML → REST entities herladen
# ============================================================

rest:
  - resource: http://RASPBERRY_PI_IP:8099/api/state
    scan_interval: 3600  # elk uur checken (data wijzigt wekelijks)
    sensor:
      - name: "El Niño Voorspelling"
        value_template: "{{ value_json.prediction_status }}"
        json_attributes:
          - prediction_score
          - prediction_reasons
          - last_update
          - previous_update
          - alerts

      - name: "Niño 3.4 Anomalie"
        value_template: "{{ value_json.nino34_ssta }}"
        unit_of_measurement: "°C"
        json_attributes:
          - nino34_sst
          - nino34_mutation
          - nino34_trend
          - week
          - history_nino34

      - name: "Niño 3.4 Mutatie"
        value_template: "{{ value_json.nino34_mutation }}"
        unit_of_measurement: "°C"

      - name: "Ocean Heat Content"
        value_template: "{{ value_json.heat_content }}"
        unit_of_measurement: "°C"

      - name: "Passaatwinden Centraal Pacific"
        value_template: "{{ value_json.trade_wind_cpac }}"
        unit_of_measurement: "m/s"

      - name: "SOI Index"
        value_template: "{{ value_json.soi }}"


